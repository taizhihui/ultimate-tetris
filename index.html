<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Mario Tetris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </div>
    <div class="hills">
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
    </div>
    <div class="bushes">
      <div class="bush bush-1"></div>
      <div class="bush bush-2"></div>
    </div>
    <div class="ground"></div>
    <canvas id="mario-stage" class="mario-stage"></canvas>

    <main class="game-wrap">
      <header class="title-bar">
        <h1 class="title">SUPER MARIO TETRIS</h1>
      </header>

      <div class="game-area">
        <aside class="panel left-panel">
          <div class="stat">
            <div class="stat-label">MARIO</div>
            <div class="stat-value" id="score">000000</div>
          </div>
          <div class="stat">
            <div class="stat-label">WORLD</div>
            <div class="stat-value" id="level">1-1</div>
          </div>
          <div class="stat">
            <div class="stat-label">COINS</div>
            <div class="stat-value coin"><span class="coin-icon">$</span><span id="lines">00</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">LIVES</div>
            <div class="stat-value"><span class="mario-icon">M</span>x<span id="lives">3</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">MODE</div>
            <div class="stat-value" id="difficulty">—</div>
          </div>
        </aside>

        <div class="board-frame">
          <canvas id="board" width="300" height="600"></canvas>
          <div id="overlay" class="overlay hidden">
            <div class="overlay-inner">
              <div id="overlay-title" class="overlay-title">PAUSED</div>
              <div id="overlay-sub" class="overlay-sub">PRESS P TO RESUME</div>
            </div>
          </div>
          <div id="start-overlay" class="overlay start-overlay">
            <div class="overlay-inner">
              <div class="overlay-title">SELECT WORLD</div>
              <div class="overlay-sub" style="animation:none;margin-bottom:14px">PICK YOUR DIFFICULTY</div>
              <div class="diff-grid">
                <button class="diff-btn easy" data-diff="easy">
                  <span class="diff-name">EASY</span>
                  <span class="diff-sub">GOOMBA &middot; 1.0x</span>
                </button>
                <button class="diff-btn medium" data-diff="medium">
                  <span class="diff-name">NORMAL</span>
                  <span class="diff-sub">KOOPA &middot; 1.5x</span>
                </button>
                <button class="diff-btn hard" data-diff="hard">
                  <span class="diff-name">HARD</span>
                  <span class="diff-sub">BOWSER &middot; 2.0x</span>
                </button>
                <button class="diff-btn insane" data-diff="insane">
                  <span class="diff-name">INSANE</span>
                  <span class="diff-sub">WARIO &middot; 3.0x</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <aside class="panel right-panel">
          <div class="stat">
            <div class="stat-label">NEXT</div>
            <canvas id="next" width="120" height="120"></canvas>
          </div>
          <div class="controls">
            <div class="ctrl-title">CONTROLS</div>
            <div class="ctrl-row"><span class="key">&larr; &rarr;</span><span>MOVE</span></div>
            <div class="ctrl-row"><span class="key">&darr;</span><span>DROP</span></div>
            <div class="ctrl-row"><span class="key">&uarr;</span><span>ROTATE</span></div>
            <div class="ctrl-row"><span class="key">SPACE</span><span>HARD</span></div>
            <div class="ctrl-row"><span class="key">P</span><span>PAUSE</span></div>
            <div class="ctrl-row ctrl-toggle" id="music-toggle"><span class="key">M</span><span id="music-label">MUSIC ON</span></div>
            <div class="ctrl-row ctrl-toggle" id="sfx-toggle"><span class="key">N</span><span id="sfx-label">SFX ON</span></div>
          </div>
        </aside>
      </div>

      <footer class="flag-pole">
        <div class="pole"></div>
        <div class="flag"></div>
        <div class="castle">
          <div class="castle-top">
            <div class="merlon"></div><div class="gap"></div>
            <div class="merlon"></div><div class="gap"></div>
            <div class="merlon"></div>
          </div>
          <div class="castle-body">
            <div class="castle-door"></div>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
